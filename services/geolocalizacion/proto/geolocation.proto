syntax = "proto3";

package geolocation;

service GeolocationService {
  rpc EnrichAlertData (AlertRequest) returns (EnrichedAlertResponse);
}

// Mensaje anidado para estructurar latitud y longitud numéricamente
message Coordinates {
  double lat = 1;
  double lon = 2;
}

message AlertRequest {
  string device_id = 1;
  Coordinates coordinates = 2;
  string timestamp = 3;
  string emergency_type = 4;
}

message EnrichedAlertResponse {
  bool success = 1;
  string message = 2;
  string device_id = 3;
  Coordinates coordinates = 4;
  string timestamp = 5;
  string emergency_type = 6;
  string location_details = 7; // El dato procesado (zona, sector) devuelto como JSON en string
}